spack:
  include:
  - toolchains.yaml
  - mirrors.yaml

  definitions:
  - compilers: [gcc_all, llvm_gfortran]
  - mpis: [mpich, openmpi] # mvapich2,

  view: false
  specs:
  - autoconf
  - automake
  - cmake
  - matrix:
    - [$mpis]
    - [$%compilers]
  - matrix:
    - - metis
    - [$%compilers]
  - matrix:
    - - cgns
      - hdf5 +cxx +fortran +mpi
      - parmetis
      - petsc@3.23.3 ~superlu-dist
      - petsc@3.23.3 ~superlu-dist +ptscotch ~metis
      - scotch+metis~threads
    - [$^mpis]
    - [$%compilers]
  concretizer:
    unify: false

  config:
    install_tree:
      root: .spack/spack_root
      padded_length: 128

  packages:
    gcc:
      externals: []
    llvm:
      externals: []
    all:
      require: target=x86_64_v3
